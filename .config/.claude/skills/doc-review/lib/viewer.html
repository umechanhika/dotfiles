<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>doc-review</title>
  <!-- All assets are local. No CDN / external requests. -->
  <link rel="stylesheet" href="/lib/comment.css">
  <script src="/lib/marked.min.js"></script>
</head>
<body>
  <header id="rd-topbar">
    <div class="rd-topbar-left">
      <span id="rd-filename">…</span>
      <span id="rd-status" class="rd-status">読み込み中…</span>
    </div>
    <div class="rd-topbar-right">
      <label class="rd-hint">選択／クリック → <kbd>⌘Enter</kbd>で追加 ・ <kbd>⌘⇧Enter</kbd>で一括送信</label>
      <button id="rd-sidebar-toggle" class="rd-icon-btn" type="button"
              aria-label="コメントパネルの開閉" aria-expanded="true" title="コメントパネルの開閉">☰</button>
    </div>
  </header>

  <main id="rd-main">
    <!-- markdown renders into #rd-content; HTML renders into the iframe so the
         target's own <head> CSS applies in an isolated document. Exactly one is
         visible at a time (toggled in comment.js render()). The iframe is
         sandboxed WITHOUT allow-scripts: the target's CSS/static look is faithful
         but its <script>s do not run (they could fight our marker injection). -->
    <article id="rd-content" aria-label="プレビュー"></article>
    <iframe id="rd-frame" title="プレビュー" sandbox="allow-same-origin" hidden></iframe>
  </main>

  <aside id="rd-sidebar" aria-label="コメントパネル">
    <div id="rd-resize-handle" class="rd-resize-handle" title="ドラッグで幅を変更" aria-hidden="true"></div>
    <div class="rd-sidebar-head">
      <h2>コメント <span id="rd-count" class="rd-badge">0</span></h2>
    </div>
    <div id="rd-list" class="rd-list"></div>
    <div class="rd-sidebar-foot">
      <button id="rd-send" class="rd-btn rd-btn-primary" disabled>Claude に送信</button>
      <p id="rd-send-note" class="rd-send-note"></p>
    </div>
  </aside>

  <!-- Comment input popover -->
  <div id="rd-popover" class="rd-popover" hidden>
    <div class="rd-popover-target" id="rd-popover-target"></div>
    <textarea id="rd-popover-text" rows="3" placeholder="コメントを入力…"></textarea>
    <div class="rd-popover-actions">
      <button id="rd-popover-cancel" class="rd-btn rd-btn-ghost">キャンセル</button>
      <button id="rd-popover-add" class="rd-btn rd-btn-primary">追加</button>
    </div>
  </div>

  <div id="rd-toast" class="rd-toast"></div>

  <!-- Visually hidden live region: announces Claude's updates to assistive tech. -->
  <div id="rd-live" class="rd-sr-only" aria-live="polite" role="status"></div>

  <script src="/lib/comment.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", function () {
      ReviewDoc.start();
    });
  </script>
</body>
</html>
